services:
  db:
    image: postgres:15
    container_name: db_proyecto2
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/data.sql:/docker-entrypoint-initdb.d/02-data.sql

  backend:
    build: ./backend
    container_name: backend_proyecto2
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: frontend_proyecto2
    ports:
      - "5173:5173"
    depends_on:
      - backend
